services:
  postgres:
    image: postgres:16-alpine
    container_name: checklab-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-checklabdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    # Local `docker compose up` builds from source and tags the image with this
    # name. In CI/prod, IMAGE_PREFIX=ghcr.io/<owner>/<repo> so `docker compose
    # pull` fetches the pre-built image by the same name.
    image: ${IMAGE_PREFIX:-checklab}/backend:latest
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: checklab-backend-1
    restart: unless-stopped
    env_file: ./apps/backend/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${IMAGE_PREFIX:-checklab}/frontend:latest
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-QuizAppBot}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/nginx.conf.template
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
